<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Menu Manager</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f5f7;
            margin: 0;
            padding: 20px;
            padding-bottom: 80px; /* Space for bottom nav */
            color: #333;
        }
        .header { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { margin: 0; color: #e75a24; }
        
        /* Add Form Styles */
        .add-form { background: white; padding: 20px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .add-form input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .add-btn { background: #60B246; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; }
        
        /* Menu Item Styles */
        .menu-item { display: flex; align-items: center; background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .menu-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; margin-right: 15px; }
        .menu-details { flex: 1; }
        .menu-details h4 { margin: 0 0 5px 0; }
        .delete-btn { background: #ffebee; color: #d32f2f; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* Bottom Nav Styles */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; box-shadow: 0 -4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { text-decoration: none; color: #888; font-weight: 600; font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #e75a24; }
        .nav-icon { font-size: 22px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🍔 Menu Manager</h1>
        <p style="margin:5px 0 0; color:#666;">Add or remove items from your website.</p>
    </div>

    <div class="add-form">
        <h3 style="margin-top:0;">Add New Item</h3>
        <form id="addFoodForm" onsubmit="addFoodItem(event)">
            <input type="text" id="addName" placeholder="Food Name (e.g. Cheese Pizza)" required>
            <input type="text" id="addDesc" placeholder="Description" required>
            <input type="number" id="addPrice" placeholder="Price in ₹" required>
            <input type="text" id="addImage" placeholder="Image URL (Unsplash link)" required>
            <button type="submit" class="add-btn">➕ Add to Menu</button>
        </form>
    </div>

    <h3>Live Website Menu</h3>
    <div id="menuContainer">
        <p>Loading menu...</p>
    </div>

    <div class="bottom-nav">
        <a href="admin.html" class="nav-item">
            <span class="nav-icon">📦</span>
            <span>Orders</span>
        </a>
        <a href="admin-menu.html" class="nav-item active">
            <span class="nav-icon">🍔</span>
            <span>Menu</span>
        </a>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000';

        // 1. Fetch and display all food items
        async function fetchMenu() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/menu`);
                const menu = await response.json();
                const container = document.getElementById('menuContainer');

                if (menu.length === 0) {
                    container.innerHTML = '<p>Your menu is empty!</p>';
                    return;
                }

                container.innerHTML = menu.map(item => `
    <div class="menu-item" style="flex-wrap: wrap;">
        <img src="${item.image}" class="menu-img" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600';">
        <div class="menu-details" style="min-width: 150px;">
            <h4>${item.name}</h4>
            <span style="color: #60B246; font-weight: bold;">₹${item.price}</span>
        </div>
        
        <div style="display:flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; justify-content: flex-end; flex: 1;">
            <button onclick="updatePrice('${item._id}')" style="background: #fff3e0; color: #e65100; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer;">
                💰 Price
            </button>
            <button onclick="updateImage('${item._id}')" style="background: #e3f2fd; color: #1976d2; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer;">
                🖼️ Image
            </button>
            <button onclick="deleteFoodItem('${item._id}')" class="delete-btn">
                🗑️ Delete
            </button>
        </div>
    </div>
`).join('');
            } catch (err) {
                console.error("Error fetching menu");
            }
        }

        // 2. Add a new food item
        async function addFoodItem(event) {
            event.preventDefault(); // Stop page from refreshing
            
            const newItem = {
                name: document.getElementById('addName').value,
                description: document.getElementById('addDesc').value,
                price: Number(document.getElementById('addPrice').value),
                image: document.getElementById('addImage').value,
                rating: 4.5, // Default rating for new items
                deliveryTime: "30" // Default delivery time
            };

            try {
                await fetch(`${API_BASE_URL}/api/menu/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newItem)
                });
                
                alert("Item added successfully!");
                document.getElementById('addFoodForm').reset(); // Clear the form
                fetchMenu(); // Refresh the list
            } catch (err) {
                alert("Failed to add item.");
            }
        }

        // 3. Delete a food item
        async function deleteFoodItem(id) {
            if (!confirm("Are you sure you want to delete this item? It will be removed from the website immediately.")) return;

            try {
                await fetch(`${API_BASE_URL}/api/menu/${id}`, { method: 'DELETE' });
                fetchMenu(); // Refresh the list so the deleted item disappears
            } catch (err) {
                alert("Failed to delete item.");
            }
        }
        // 4. Update an item's image
async function updateImage(id) {
    // Pop up a box asking the admin for the new link
    const newUrl = prompt("Paste the new image URL (e.g., from Unsplash):");
    
    // If they click 'Cancel' or leave it blank, do nothing
    if (!newUrl || newUrl.trim() === "") return;

    try {
        const response = await fetch(`${API_BASE_URL}/api/menu/${id}/image`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ newImage: newUrl })
        });

        if (response.ok) {
            fetchMenu(); // Refresh the list to show the new picture instantly!
        } else {
            alert("The server failed to update the image.");
        }
    } catch (err) {
        alert("Could not connect to the server.");
    }
}

        // Load menu when page opens
        window.addEventListener('DOMContentLoaded', fetchMenu);

// 5. Update an item's price
// 5. Update an item's price (SMART VERSION)
async function updatePrice(id) {
    const newPrice = prompt("Enter the new price in ₹ (Numbers only, e.g., 250):");
    
    if (!newPrice || newPrice.trim() === "" || isNaN(newPrice)) {
        return;
    }

    try {
        const response = await fetch(`${API_BASE_URL}/api/menu/${id}/price`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ newPrice: Number(newPrice) })
        });

        // 👇 Read the exact response from the server! 👇
        if (response.ok) {
            fetchMenu(); 
        } else {
            // This catches the exact error message the server sends back
            const data = await response.json(); 
            alert("SERVER SAID: " + (data.error || "Route not found"));
        }
    } catch (err) {
        alert("Could not connect to the server.");
    }
}
    </script>
</body>
</html>
